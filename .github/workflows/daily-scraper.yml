name: Daily Recipe Scraper

on:
  schedule:
    # Runs every day at 8:00 AM Malaysia time (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Insert recipes to Supabase
        run: python scraper/insert_recipes.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🍳 Daily scrape: ${{ github.run_id }}"
          file_pattern: "scraper/"
          commit_user_name: "Recipe Bot"
          commit_user_email: "bot@bolehmasakapa.com"
