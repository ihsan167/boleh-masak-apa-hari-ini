name: Daily Recipe Scraper

on:
  schedule:
    # Runs every day at 8:00 AM Malaysia time (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper/scrape.py

      - name: Commit and push changes
        run: |
          git config user.name "Recipe Bot"
          git config user.email "bot@bolehmasakapa.com"
          git add scraper/last_scrape.json
          git diff --staged --quiet || git commit -m "🍳 Daily scrape: $(date -u '+%Y-%m-%d')"
          git push
